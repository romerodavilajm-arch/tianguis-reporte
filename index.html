<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Corredor Comercial de Peñaflor – Reporte</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #eef2ff;
      --surface: #ffffff;
      --surface2: #f0f4ff;
      --border: #c7d2ee;
      --text: #1e2a4a;
      --muted: #5b6b99;
      --accent: #2563eb;
      --red: #e63946;
      --green: #2a9d8f;
      --blue: #3b7cf5;
      --alta: #ff4757;
      --media: #f59e0b;
      --baja: #22c55e;
    }

    html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; -webkit-font-smoothing: antialiased; }

    /* HEADER */
    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      height: 56px; background: var(--accent); border-bottom: 1px solid color-mix(in srgb, var(--accent) 70%, black);
      display: flex; align-items: center; gap: 16px; padding: 0 24px;
      box-shadow: 0 2px 12px rgba(37,99,235,0.25);
    }
    .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1rem; letter-spacing: 0.08em; color: #ffffff; text-transform: uppercase; }
    .subtitle { font-size: 0.78rem; color: rgba(255,255,255,0.75); font-weight: 300; border-left: 1px solid rgba(255,255,255,0.3); padding-left: 16px; }
    .header-badge { margin-left: auto; font-size: 0.7rem; font-weight: 600; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: rgba(255,255,255,0.9); padding: 4px 10px; border-radius: 20px; letter-spacing: 0.05em; text-transform: uppercase; }

    /* LAYOUT */
    .layout { display: flex; height: 100vh; padding-top: 56px; }

    /* SIDEBAR */
    .sidebar { width: 390px; min-width: 390px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; z-index: 10; box-shadow: 2px 0 12px rgba(30,42,74,0.07); }
    .sidebar-header { padding: 18px 24px 14px; border-bottom: 1px solid var(--border); }
    .sidebar-header h2 { font-family: 'Syne', sans-serif; font-size: 0.68rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
    .sidebar-header p { font-size: 0.8rem; color: var(--muted); font-weight: 300; }

    /* DEFAULT */
    .default-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px; gap: 12px; text-align: center; }
    .default-state .icon { font-size: 2.5rem; opacity: 0.25; }
    .default-state p { font-size: 0.83rem; color: var(--muted); line-height: 1.7; }

    /* PANEL */
    .panel { flex: 1; overflow-y: auto; display: none; flex-direction: column; }
    .panel.active { display: flex; }
    .panel::-webkit-scrollbar { width: 4px; }
    .panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* TAG */
    .tag { display: inline-flex; align-items: center; gap: 6px; font-size: 0.68rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; }
    .tag::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: currentColor; }

    /* PANEL TOP */
    .panel-top { padding: 20px 24px; border-bottom: 1px solid var(--border); }
    .panel-top h1 { font-family: 'Syne', sans-serif; font-size: 1.15rem; font-weight: 800; color: var(--text); margin-bottom: 8px; line-height: 1.3; }
    .panel-top .desc { font-size: 0.82rem; color: var(--muted); line-height: 1.65; font-weight: 300; }

    /* FOLIO */
    .folio-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
    .folio-badge { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.08em; background: color-mix(in srgb, var(--alta) 10%, transparent); border: 1px solid color-mix(in srgb, var(--alta) 30%, transparent); color: var(--alta); padding: 3px 10px; border-radius: 20px; }

    /* STATS GRID */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); border-top: 1px solid var(--border); }
    .stat-cell { background: var(--surface); padding: 13px 18px; transition: background 0.15s; }
    .stat-cell:hover { background: var(--surface2); }
    .stat-cell.full { grid-column: 1 / -1; }
    .stat-label { font-size: 0.63rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
    .stat-value { font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 700; color: var(--text); }
    .stat-value.sm { font-family: 'DM Sans'; font-size: 0.82rem; font-weight: 500; }
    .stat-value.accent { color: var(--accent); }
    .stat-value.blue { color: var(--blue); }
    .stat-value.green { color: var(--green); }

    /* SECTION */
    .section { padding: 18px 24px; border-bottom: 1px solid var(--border); }
    .section-title { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }

    /* OBSERVACIONES */
    .obs-item { display: flex; gap: 10px; font-size: 0.79rem; color: var(--muted); margin-bottom: 7px; line-height: 1.55; }
    .obs-item::before { content: '–'; color: var(--accent); flex-shrink: 0; }

    /* PROBLEMAS */
    .problem-item { background: var(--surface2); border: 1px solid var(--border); border-left: 3px solid var(--sev); border-radius: 8px; padding: 13px; margin-bottom: 8px; transition: background 0.15s; }
    .problem-item:hover { background: color-mix(in srgb, var(--surface2) 70%, var(--border) 30%); }
    .prob-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .sev-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--sev); flex-shrink: 0; }
    .prob-title { font-size: 0.84rem; font-weight: 600; color: var(--text); }
    .prob-desc { font-size: 0.77rem; color: var(--muted); line-height: 1.55; font-weight: 300; }
    .sev-badge { margin-left: auto; font-size: 0.61rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 2px 8px; border-radius: 20px; background: color-mix(in srgb, var(--sev) 15%, transparent); color: var(--sev); border: 1px solid color-mix(in srgb, var(--sev) 30%, transparent); flex-shrink: 0; }

    /* DISTANCE BOX */
    .dist-box { background: color-mix(in srgb, var(--blue) 8%, transparent); border: 1px solid color-mix(in srgb, var(--blue) 22%, transparent); border-radius: 10px; padding: 16px 18px; }
    .dist-label { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--blue); margin-bottom: 8px; }
    .dist-value { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; color: var(--blue); line-height: 1; }
    .dist-unit { font-size: 1rem; font-weight: 400; margin-left: 4px; }
    .dist-note { font-size: 0.72rem; color: var(--muted); margin-top: 6px; }

    /* AREA BOX */
    .area-box { background: color-mix(in srgb, var(--green) 8%, transparent); border: 1px solid color-mix(in srgb, var(--green) 22%, transparent); border-radius: 10px; padding: 16px 18px; margin-bottom: 10px; }
    .area-label { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--green); margin-bottom: 8px; }
    .area-value { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; color: var(--green); line-height: 1; }
    .area-unit { font-size: 1rem; font-weight: 400; margin-left: 4px; }

    /* GOOGLE MAPS BUTTON */
    .maps-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 11px; border-radius: 8px; background: color-mix(in srgb, #4285f4 10%, transparent); border: 1px solid color-mix(in srgb, #4285f4 35%, transparent); color: #1a56db; font-size: 0.82rem; font-weight: 600; text-decoration: none; transition: background 0.2s, color 0.2s; margin-top: 4px; }
    .maps-btn:hover { background: #4285f4; color: #fff; }

    /* CAROUSEL */
    .carousel-wrap { border-radius: 10px; overflow: hidden; background: var(--surface2); border: 1px solid var(--border); }
    .carousel-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 140px; gap: 8px; cursor: pointer; user-select: none; transition: background 0.2s; }
    .carousel-placeholder:hover { background: color-mix(in srgb, var(--accent) 6%, var(--surface2)); }
    .carousel-placeholder:active { background: color-mix(in srgb, var(--accent) 12%, var(--surface2)); }
    .carousel-placeholder-icon { font-size: 1.8rem; opacity: 0.4; }
    .carousel-placeholder-text { font-size: 0.77rem; color: var(--muted); font-weight: 500; }
    .carousel-slot { display: none; }
    .carousel-wrap.loaded .carousel-placeholder { display: none; }
    .carousel-wrap.loaded .carousel-slot { display: block; }
    .carousel-viewport { height: 190px; overflow: hidden; cursor: grab; }
    .carousel-viewport img { width: 100%; height: 100%; object-fit: cover; display: none; pointer-events: none; }
    .carousel-viewport img.c-active { display: block; }
    .carousel-bar { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border-top: 1px solid var(--border); background: var(--surface); }
    .carousel-nav { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 4px 14px; cursor: pointer; font-size: 1rem; color: var(--text); transition: background 0.15s; line-height: 1.4; }
    .carousel-nav:hover { background: var(--surface2); color: var(--accent); border-color: var(--accent); }
    .carousel-count { font-size: 0.72rem; color: var(--muted); }
    .carousel-empty { display: flex; align-items: center; justify-content: center; height: 72px; font-size: 0.77rem; color: var(--muted); font-style: italic; gap: 6px; }

    /* MAP */
    #map { flex: 1; height: 100%; }

    /* Leaflet controls – tema claro */
    .leaflet-control-zoom a {
      background: var(--surface) !important;
      color: var(--text) !important;
      border-color: var(--border) !important;
    }
    .leaflet-control-zoom a:hover {
      background: var(--surface2) !important;
      color: var(--accent) !important;
    }
    .leaflet-control-zoom {
      border: 1px solid var(--border) !important;
      border-radius: 8px !important;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(30,42,74,0.10) !important;
    }
    .leaflet-bar { border: none !important; }

    /* LEGEND */
    .legend { position: absolute; bottom: 24px; right: 16px; z-index: 999; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; box-shadow: 0 2px 12px rgba(30,42,74,0.10); max-height: calc(100vh - 120px); overflow-y: auto; }
    .legend::-webkit-scrollbar { width: 3px; }
    .legend::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .leg-section { font-size: 0.58rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; margin-top: 2px; }
    .leg-divider { height: 1px; background: var(--border); margin: 8px 0; }
    .leg-item { display: flex; align-items: center; gap: 8px; font-size: 0.74rem; color: var(--muted); margin-bottom: 6px; }
    .leg-item:last-child { margin-bottom: 0; }
    .leg-dot { width: 12px; height: 8px; border-radius: 2px; flex-shrink: 0; }
    .leg-circle { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; border: 1.5px solid rgba(255,255,255,0.7); box-shadow: 0 0 0 1px rgba(0,0,0,0.15); }

    /* Leaflet popup */
    .leaflet-popup-content-wrapper { background: var(--surface) !important; border: 1px solid var(--border) !important; border-radius: 8px !important; color: var(--text) !important; box-shadow: 0 8px 24px rgba(30,42,74,0.14) !important; }
    .leaflet-popup-tip { background: var(--surface) !important; }
    .leaflet-popup-content { font-family: 'DM Sans', sans-serif !important; font-size: 0.82rem !important; margin: 12px 14px !important; }
    .pop-tag { display: inline-block; font-size: 0.63rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 2px 8px; border-radius: 20px; margin-bottom: 6px; }
    .pop-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.88rem; margin-bottom: 3px; }
    .pop-hint { color: var(--muted); font-size: 0.73rem; }

    /* DRAWER HANDLE (mobile only, hidden on desktop) */
    .drawer-handle { display: none; }

    /* ── MOBILE ────────────────────────────────────────── */
    @media (max-width: 768px) {
      /* Header: ocultar subtítulo para ganar espacio */
      .subtitle { display: none; }
      header { padding: 0 16px; gap: 10px; height: 52px; }
      .header-badge { font-size: 0.65rem; padding: 3px 8px; }

      /* Layout: columna, el mapa ocupa todo */
      .layout { flex-direction: row; padding-top: 52px; }

      /* Sidebar → drawer fijo en la parte inferior */
      .sidebar {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        width: 100% !important;
        min-width: unset !important;
        height: 76px;
        border-right: none;
        border-top: 2px solid var(--accent);
        border-radius: 20px 20px 0 0;
        z-index: 500;
        transition: height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        overflow: hidden;
        box-shadow: 0 -4px 24px rgba(37,99,235,0.14);
      }
      .sidebar.expanded { height: 62vh; }

      /* Handle visible en móvil */
      .drawer-handle {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 40px;
        cursor: pointer;
        flex-shrink: 0;
        touch-action: manipulation;
      }
      .drawer-handle::before {
        content: '';
        width: 40px; height: 4px;
        background: var(--border);
        border-radius: 2px;
        transition: background 0.2s;
      }
      .drawer-handle:active::before { background: var(--accent); }

      /* Sidebar header más compacto */
      .sidebar-header { padding: 4px 16px 10px; }
      .sidebar-header h2 { font-size: 0.66rem; color: var(--accent); }
      .sidebar-header p { font-size: 0.76rem; }

      /* Estado por defecto más compacto */
      .default-state { padding: 16px 24px; gap: 8px; }
      .default-state .icon { font-size: 1.8rem; }
      .default-state p { font-size: 0.82rem; }

      /* Panel scroll con espacio seguro inferior */
      .panel { padding-bottom: env(safe-area-inset-bottom, 8px); }

      /* Panel top más compacto */
      .panel-top { padding: 14px 16px; }
      .panel-top h1 { font-size: 1.05rem; }
      .panel-top .desc { font-size: 0.83rem; }

      /* Secciones */
      .section { padding: 14px 16px; }
      .section-title { font-size: 0.67rem; }

      /* Legibilidad */
      .stat-label { font-size: 0.67rem; }
      .stat-value { font-size: 1rem; }
      .stat-value.sm { font-size: 0.85rem; }
      .obs-item { font-size: 0.83rem; }
      .prob-title { font-size: 0.88rem; }
      .prob-desc { font-size: 0.81rem; }

      /* Botón Google Maps: área táctil mínima 44px */
      .maps-btn { padding: 14px 16px; font-size: 0.9rem; min-height: 48px; border-radius: 10px; }

      /* Leyenda: sobre el drawer colapsado */
      .legend { bottom: 88px; right: 12px; padding: 10px 12px; max-height: 42vh; }
      .leg-item { font-size: 0.72rem; }
      .leg-section { font-size: 0.56rem; }

      /* Controles de zoom de Leaflet: más grandes en touch */
      .leaflet-control-zoom a {
        width: 40px !important; height: 40px !important;
        line-height: 40px !important; font-size: 20px !important;
        background: var(--surface) !important;
        color: var(--text) !important;
        border-color: var(--border) !important;
      }
      .leaflet-control-zoom {
        border: 1px solid var(--border) !important;
        border-radius: 10px !important;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(30,42,74,0.10) !important;
      }
    }

    /* Pantallas muy pequeñas */
    @media (max-width: 380px) {
      .logo { font-size: 0.88rem; }
      .sidebar.expanded { height: 65vh; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">🗺 Tianguis</div>
  <div class="subtitle">Reporte – Corredor Comercial de Peñaflor</div>
  <div class="header-badge">Felipe Carrillo Puerto</div>
</header>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="drawer-handle" id="drawerHandle" role="button" aria-label="Abrir panel de información"></div>
    <div class="sidebar-header">
      <h2>Panel de información</h2>
      <p>Selecciona un polígono en el mapa</p>
    </div>
    <div class="default-state" id="defaultState">
      <div class="icon">👆</div>
      <p>
        Haz clic sobre el <strong style="color:var(--red)">corredor actual</strong> (rojo)<br>
        o sobre una <strong style="color:var(--green)">propuesta de reubicación</strong> (verde)<br>
        para ver su información detallada.
      </p>
    </div>
    <div class="panel" id="infoPanel"></div>
  </aside>

  <div style="position:relative;flex:1;">
    <div id="map"></div>
    <div class="legend" id="mapLegend"></div>
  </div>
</div>

<script>
// ── MOBILE HELPERS ────────────────────────────────────
const isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
const isMobile = () => window.innerWidth <= 768;

// Drawer toggle
const sidebar  = document.getElementById('sidebar');
const drawerHandle = document.getElementById('drawerHandle');
drawerHandle.addEventListener('click', () => {
  sidebar.classList.toggle('expanded');
});

function openDrawer()  { sidebar.classList.add('expanded'); }
function closeDrawer() { sidebar.classList.remove('expanded'); }

// Instrucción táctil vs ratón
const defaultState = document.getElementById('defaultState');
if (isTouch) {
  defaultState.querySelector('p').innerHTML =
    'Toca el <strong style="color:var(--red)">corredor actual</strong> (rojo)<br>' +
    'o una <strong style="color:var(--green)">propuesta de reubicación</strong> (verde)<br>' +
    'para ver su información detallada.';
  defaultState.querySelector('.icon').textContent = '👇';
}

// ── MAPA ─────────────────────────────────────────────
const map = L.map('map', {
  center: [20.6420, -100.4870],
  zoom: 15,
  zoomControl: true,
  renderer: L.svg()
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap contributors, © CARTO',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

// ── HELPERS ──────────────────────────────────────────
function sevColor(s) {
  return s === 'alta' ? '#ff4757' : s === 'media' ? '#ffa502' : '#2ed573';
}

function calcArea(coordenadas) {
  const poly = { type: 'Feature', geometry: { type: 'Polygon', coordinates: [coordenadas.map(c => [c[1], c[0]])] } };
  const m2 = turf.area(poly);
  return {
    display: m2 < 10000 ? `${Math.round(m2).toLocaleString('es-MX')}` : `${(m2/10000).toFixed(2)}`,
    unit: m2 < 10000 ? 'm²' : 'ha',
    raw: m2
  };
}

function calcDistance(coords1, coords2) {
  const centroid = arr => {
    const n = arr.length;
    const s = arr.reduce((a, b) => [a[0]+b[0], a[1]+b[1]], [0,0]);
    return turf.point([s[1]/n, s[0]/n]);
  };
  const d = turf.distance(centroid(coords1), centroid(coords2), { units: 'meters' });
  return Math.round(d).toLocaleString('es-MX');
}

// ── CAROUSEL ─────────────────────────────────────────
function buildCarousel(fotos, containerId) {
  const wrap = document.getElementById(containerId);
  if (!fotos || fotos.length === 0) {
    wrap.innerHTML = '<div class="carousel-empty">📷 Sin fotos disponibles</div>';
    return;
  }
  const count = fotos.length;
  const imgs = fotos.map(function(src, i) {
    return '<img src="' + src + '" alt="Foto ' + (i + 1) + '"' + (i === 0 ? ' class="c-active"' : '') + ' loading="lazy">';
  }).join('');
  wrap.innerHTML =
    '<div class="carousel-placeholder" id="' + containerId + '-ph">' +
      '<div class="carousel-placeholder-icon">📷</div>' +
      '<div class="carousel-placeholder-text">Toca para ver ' + count + ' foto' + (count > 1 ? 's' : '') + '</div>' +
    '</div>' +
    '<div class="carousel-slot">' +
      '<div class="carousel-viewport">' + imgs + '</div>' +
      '<div class="carousel-bar">' +
        '<button class="carousel-nav" id="' + containerId + '-prev">‹</button>' +
        '<span class="carousel-count" id="' + containerId + '-count">1 / ' + count + '</span>' +
        '<button class="carousel-nav" id="' + containerId + '-next">›</button>' +
      '</div>' +
    '</div>';

  document.getElementById(containerId + '-ph').addEventListener('click', function() {
    wrap.classList.add('loaded');
  }, { once: true });

  var cur = 0;
  var imgEls = wrap.querySelectorAll('.carousel-viewport img');
  var countEl = document.getElementById(containerId + '-count');

  function goTo(n) {
    imgEls[cur].classList.remove('c-active');
    cur = ((n % count) + count) % count;
    imgEls[cur].classList.add('c-active');
    countEl.textContent = (cur + 1) + ' / ' + count;
  }

  document.getElementById(containerId + '-prev').addEventListener('click', function() { goTo(cur - 1); });
  document.getElementById(containerId + '-next').addEventListener('click', function() { goTo(cur + 1); });

  var viewport = wrap.querySelector('.carousel-viewport');
  var startX = 0;
  viewport.addEventListener('touchstart', function(e) { startX = e.touches[0].clientX; }, { passive: true });
  viewport.addEventListener('touchend', function(e) {
    var dx = e.changedTouches[0].clientX - startX;
    if (Math.abs(dx) > 40) goTo(dx < 0 ? cur + 1 : cur - 1);
  });
}

// ── INIT ─────────────────────────────────────────────
fetch('./data/tianguis.json')
  .then(r => r.json())
  .then(initApp);

function initApp(data) {
  const { corredor, prediosReubicacion, otrosTianguis = [] } = data;
  const allLayers = [];

  function resetStyles() {
    allLayers.forEach(l => l.setStyle({ weight: 2.5, fillOpacity: 0.22 }));
  }

  // ── CORREDOR PRINCIPAL (rojo)
  const corridorLayer = L.polygon(corredor.coordenadas, {
    color: '#e63946', fillColor: '#e63946',
    fillOpacity: 0.22, weight: 2.5
  }).addTo(map);

  corridorLayer.bindPopup(`
    <div class="pop-tag" style="background:color-mix(in srgb,#e63946 15%,transparent);color:#e63946;border:1px solid color-mix(in srgb,#e63946 30%,transparent)">● Corredor actual</div>
    <div class="pop-name">${corredor.nombre}</div>
    <div class="pop-hint">Click para ver detalles →</div>
  `, { closeButton: false });

  if (!isTouch) {
    corridorLayer.on('mouseover', function() { this.openPopup(); });
    corridorLayer.on('mouseout',  function() { this.closePopup(); });
  }
  corridorLayer.on('click', () => {
    resetStyles();
    corridorLayer.setStyle({ weight: 4, fillOpacity: 0.38 });
    showCorredorPanel(corredor, prediosReubicacion);
    if (isMobile()) {
      openDrawer();
      map.flyToBounds(corridorLayer.getBounds(), { paddingTopLeft: [20, 20], paddingBottomRight: [20, 160], duration: 0.7 });
    } else {
      map.flyToBounds(corridorLayer.getBounds(), { padding: [80, 80], duration: 0.7 });
    }
  });
  allLayers.push(corridorLayer);

  // ── PREDIOS REUBICACIÓN (verde, bordeados con dash)
  prediosReubicacion.forEach((predio, i) => {
    const layer = L.polygon(predio.coordenadas, {
      color: '#2a9d8f', fillColor: '#2a9d8f',
      fillOpacity: 0.22, weight: 2.5,
      dashArray: '7 4'
    }).addTo(map);

    // Número sobre el polígono
    const center = layer.getBounds().getCenter();
    L.marker(center, {
      icon: L.divIcon({
        className: '',
        html: `<div style="
          font-family:'Syne',sans-serif;font-weight:800;font-size:13px;
          color:#fff;background:#2a9d8f;border:2px solid #fff;
          width:26px;height:26px;border-radius:50%;
          display:flex;align-items:center;justify-content:center;
          box-shadow:0 2px 8px rgba(0,0,0,0.4);
          margin-left:-13px;margin-top:-13px;
        ">${predio.numero}</div>`,
        iconSize: [26, 26]
      })
    }).addTo(map);

    layer.bindPopup(`
      <div class="pop-tag" style="background:color-mix(in srgb,#2a9d8f 15%,transparent);color:#2a9d8f;border:1px solid color-mix(in srgb,#2a9d8f 30%,transparent)">● Propuesta ${predio.numero}</div>
      <div class="pop-name">${predio.nombre}</div>
      <div class="pop-hint">Click para ver detalles →</div>
    `, { closeButton: false });

    if (!isTouch) {
      layer.on('mouseover', function() { this.openPopup(); });
      layer.on('mouseout',  function() { this.closePopup(); });
    }
    layer.on('click', () => {
      resetStyles();
      layer.setStyle({ weight: 4, fillOpacity: 0.4 });
      showPredioPanel(predio, corredor);
      if (isMobile()) {
        openDrawer();
        map.flyToBounds(layer.getBounds(), { paddingTopLeft: [20, 20], paddingBottomRight: [20, 160], duration: 0.7 });
      } else {
        map.flyToBounds(layer.getBounds(), { padding: [80, 80], duration: 0.7 });
      }
    });
    allLayers.push(layer);
  });

  // ── OTROS TIANGUIS (azul)
  otrosTianguis.forEach(function(tianguis) {
    var tColor = tianguis.color || '#3b7cf5';
    var tLayer = L.polygon(tianguis.coordenadas, {
      color: tColor, fillColor: tColor,
      fillOpacity: 0.22, weight: 2.5
    }).addTo(map);

    tLayer.bindPopup(
      '<div class="pop-tag" style="background:color-mix(in srgb,' + tColor + ' 15%,transparent);color:' + tColor + ';border:1px solid color-mix(in srgb,' + tColor + ' 30%,transparent)">● Tianguis registrado</div>' +
      '<div class="pop-name">' + tianguis.nombre + '</div>' +
      '<div class="pop-hint">' + (isTouch ? 'Toca' : 'Click') + ' para ver detalles →</div>',
      { closeButton: false }
    );

    if (!isTouch) {
      tLayer.on('mouseover', function() { this.openPopup(); });
      tLayer.on('mouseout',  function() { this.closePopup(); });
    }
    tLayer.on('click', function() {
      resetStyles();
      tLayer.setStyle({ weight: 4, fillOpacity: 0.38 });
      showTianguisPanel(tianguis, corredor);
      if (isMobile()) {
        openDrawer();
        map.flyToBounds(tLayer.getBounds(), { paddingTopLeft: [20, 20], paddingBottomRight: [20, 160], duration: 0.7 });
      } else {
        map.flyToBounds(tLayer.getBounds(), { padding: [80, 80], duration: 0.7 });
      }
    });
    allLayers.push(tLayer);
  });

  // ── PUESTOS EN VÍA PÚBLICA (círculos por organización)
  var orgColors = {};
  Object.keys(data.organizaciones || {}).forEach(function(key) {
    orgColors[key] = data.organizaciones[key].color;
  });

  (data.puestosViaPublica || []).forEach(function(puesto) {
    var color = orgColors[puesto.organizacion] || '#78716c';
    var marker = L.circleMarker([puesto.lat, puesto.lng], {
      radius: 7,
      color: '#ffffff',
      weight: 1.5,
      fillColor: color,
      fillOpacity: 0.88
    }).addTo(map);

    marker.bindPopup(
      '<div class="pop-tag" style="background:color-mix(in srgb,' + color + ' 15%,transparent);color:' + color + ';border:1px solid color-mix(in srgb,' + color + ' 30%,transparent)">● ' + puesto.organizacion + '</div>' +
      '<div class="pop-name">' + puesto.nombre + '</div>' +
      '<div style="font-size:0.78rem;color:var(--muted);margin-top:3px">' + puesto.giro + '</div>' +
      '<div style="font-size:0.7rem;color:var(--muted);margin-top:5px;opacity:0.8">' + puesto.fechaHora + '</div>',
      { closeButton: false }
    );

    if (!isTouch) {
      marker.on('mouseover', function() { this.openPopup(); });
      marker.on('mouseout',  function() { this.closePopup(); });
    }
  });

  // ── LEYENDA DINÁMICA
  (function buildLegend() {
    var legend = document.getElementById('mapLegend');
    var html = '';

    html += '<div class="leg-section">Capas</div>';
    html += '<div class="leg-item"><div class="leg-dot" style="background:#e63946"></div>Corredor actual</div>';
    html += '<div class="leg-item"><div class="leg-dot" style="background:#2a9d8f;border:1px dashed #2a9d8f"></div>Propuestas de reubicación (' + data.prediosReubicacion.length + ')</div>';
    html += '<div class="leg-item"><div class="leg-dot" style="background:#3b7cf5"></div>Otros tianguis</div>';

    if (data.puestosViaPublica && data.puestosViaPublica.length > 0 && data.organizaciones) {
      html += '<div class="leg-divider"></div>';
      html += '<div class="leg-section">Puestos en vía pública</div>';
      Object.keys(data.organizaciones).forEach(function(key) {
        var org = data.organizaciones[key];
        html += '<div class="leg-item"><div class="leg-circle" style="background:' + org.color + '"></div>' + org.label + '</div>';
      });
    }

    legend.innerHTML = html;
  })();

  // Vista inicial: zoom al corredor
  map.fitBounds(corridorLayer.getBounds(), { padding: [80, 80] });

  // ── PANEL CORREDOR
  function showCorredorPanel(c, predios) {
    document.getElementById('defaultState').style.display = 'none';
    const panel = document.getElementById('infoPanel');
    panel.classList.add('active');

    const area = calcArea(c.coordenadas);
    const folios = c.foliosDenuncia.map(f => `<span class="folio-badge">📋 ${f}</span>`).join('');
    const obsHTML = c.observaciones.map(o => `<div class="obs-item">${o}</div>`).join('');
    const probHTML = c.problemas.map(p => `
      <div class="problem-item" style="--sev:${sevColor(p.severidad)}">
        <div class="prob-header">
          <div class="sev-dot"></div>
          <div class="prob-title">${p.titulo}</div>
          <div class="sev-badge">${p.severidad}</div>
        </div>
        <div class="prob-desc">${p.descripcion}</div>
      </div>
    `).join('');

    panel.innerHTML = `
      <div class="panel-top">
        <span class="tag" style="color:#e63946;background:color-mix(in srgb,#e63946 12%,transparent);border:1px solid color-mix(in srgb,#e63946 28%,transparent)">Corredor actual</span>
        <h1>${c.nombre}</h1>
        <p class="desc">${c.descripcion}</p>
        <div class="folio-row">${folios}</div>
      </div>

      <div class="stats-grid">
        <div class="stat-cell full">
          <div class="stat-label">Ubicación</div>
          <div class="stat-value sm">${c.ubicacion}</div>
        </div>
        <div class="stat-cell">
          <div class="stat-label">Área del corredor</div>
          <div class="stat-value accent">${area.display} ${area.unit}</div>
        </div>
        <div class="stat-cell">
          <div class="stat-label">Último seguimiento</div>
          <div class="stat-value sm">${c.ultimoSeguimiento}</div>
        </div>
        <div class="stat-cell">
          <div class="stat-label">Delegación</div>
          <div class="stat-value sm">${c.delegacion}</div>
        </div>
        <div class="stat-cell">
          <div class="stat-label">Organización</div>
          <div class="stat-value sm">${c.organizacion}</div>
        </div>
        <div class="stat-cell full">
          <div class="stat-label">Coordinador(a)</div>
          <div class="stat-value">${c.coordinador}</div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Observaciones del seguimiento</div>
        ${obsHTML}
      </div>

      <div class="section">
        <div class="section-title">Problemática (${c.problemas.length} issues)</div>
        ${probHTML}
      </div>

      <div class="section">
        <div class="section-title">Propuestas de reubicación</div>
        <p style="font-size:0.79rem;color:var(--muted);line-height:1.6">Hay <strong style="color:var(--green)">${predios.length} predios propuestos</strong> marcados en verde en el mapa. ${isTouch ? 'Toca' : 'Haz clic en'} cualquiera para ver su ubicación, dimensiones y distancia al corredor actual.</p>
      </div>

      <div class="section">
        <div class="section-title">Fotografías</div>
        <div class="carousel-wrap" id="carousel-main"></div>
      </div>
    `;
    buildCarousel(c.fotos || [], 'carousel-main');
  }

  // ── PANEL PREDIO
  function showPredioPanel(predio, corredor) {
    document.getElementById('defaultState').style.display = 'none';
    const panel = document.getElementById('infoPanel');
    panel.classList.add('active');

    const area = calcArea(predio.coordenadas);
    const dist = calcDistance(predio.coordenadas, corredor.coordenadas);

    const mapsBtn = predio.googleMaps
      ? `<a class="maps-btn" href="${predio.googleMaps}" target="_blank" rel="noopener">
           <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
           Ver en Google Maps
         </a>`
      : `<p style="font-size:0.75rem;color:var(--muted);text-align:center;padding:8px 0">Sin link de Google Maps disponible</p>`;

    panel.innerHTML = `
      <div class="panel-top">
        <span class="tag" style="color:#2a9d8f;background:color-mix(in srgb,#2a9d8f 12%,transparent);border:1px solid color-mix(in srgb,#2a9d8f 28%,transparent)">Propuesta ${predio.numero} de reubicación</span>
        <h1>${predio.nombre}</h1>
        <p class="desc">${predio.direccion}</p>
      </div>

      <div class="section">
        ${mapsBtn}
      </div>

      <div class="stats-grid">
        <div class="stat-cell full">
          <div class="stat-label">Dirección</div>
          <div class="stat-value sm">${predio.direccion}</div>
        </div>
      </div>

      <div class="section">
        <div class="area-box">
          <div class="area-label">Dimensiones del predio</div>
          <div class="area-value">${area.display}<span class="area-unit">${area.unit}</span></div>
        </div>
        <div class="dist-box">
          <div class="dist-label">Distancia al corredor actual</div>
          <div class="dist-value">${dist}<span class="dist-unit">m</span></div>
          <div class="dist-note">medida entre centroides de ambos polígonos</div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Comparativa con corredor actual</div>
        <div class="stats-grid" style="border-radius:8px;overflow:hidden;border:1px solid var(--border);margin-top:0">
          <div class="stat-cell" style="background:color-mix(in srgb,#e63946 8%,var(--surface))">
            <div class="stat-label" style="color:#e63946">Corredor actual</div>
            <div class="stat-value sm">${calcArea(corredor.coordenadas).display} ${calcArea(corredor.coordenadas).unit}</div>
          </div>
          <div class="stat-cell" style="background:color-mix(in srgb,#2a9d8f 8%,var(--surface))">
            <div class="stat-label" style="color:#2a9d8f">Este predio</div>
            <div class="stat-value sm">${area.display} ${area.unit}</div>
          </div>
        </div>
      </div>

    `;
  }

  // ── PANEL TIANGUIS
  function showTianguisPanel(t, corredorData) {
    document.getElementById('defaultState').style.display = 'none';
    const panel = document.getElementById('infoPanel');
    panel.classList.add('active');

    const area = calcArea(t.coordenadas);
    const dist = calcDistance(t.coordenadas, corredorData.coordenadas);
    const color = t.color || '#3b7cf5';

    const coordsHTML = (t.coordinadores || []).map(function(c) {
      const tel = c.telefono ? ' <span style="color:var(--muted);font-weight:300">· ' + c.telefono + '</span>' : '';
      return '<div style="font-size:0.8rem;color:var(--text);font-weight:500;margin-bottom:3px">' + c.nombre + tel + '</div>';
    }).join('');

    panel.innerHTML = `
      <div class="panel-top">
        <span class="tag" style="color:${color};background:color-mix(in srgb,${color} 12%,transparent);border:1px solid color-mix(in srgb,${color} 28%,transparent)">Tianguis registrado</span>
        <h1>${t.nombre}</h1>
        <p class="desc">${t.ubicacion}, Col. ${t.colonia}</p>
      </div>

      <div class="stats-grid">
        <div class="stat-cell">
          <div class="stat-label">Organización</div>
          <div class="stat-value sm">${t.organizacion}</div>
        </div>
        <div class="stat-cell">
          <div class="stat-label">Delegación</div>
          <div class="stat-value sm">${t.delegacion}</div>
        </div>
        <div class="stat-cell full">
          <div class="stat-label">Horario</div>
          <div class="stat-value sm">${t.horario}</div>
        </div>
        <div class="stat-cell full">
          <div class="stat-label">Coordinadores</div>
          <div style="padding-top:3px">${coordsHTML}</div>
        </div>
      </div>

      <div class="section">
        <div class="dist-box" style="background:color-mix(in srgb,${color} 8%,transparent);border:1px solid color-mix(in srgb,${color} 22%,transparent)">
          <div class="dist-label" style="color:${color}">Distancia al Corredor de Peñaflor</div>
          <div class="dist-value" style="color:${color}">${dist}<span class="dist-unit">m</span></div>
          <div class="dist-note">medida entre centroides de ambos polígonos</div>
        </div>
      </div>

      <div class="section">
        <div class="area-box" style="background:color-mix(in srgb,${color} 8%,transparent);border:1px solid color-mix(in srgb,${color} 22%,transparent)">
          <div class="area-label" style="color:${color}">Superficie del tianguis</div>
          <div class="area-value" style="color:${color}">${area.display}<span class="area-unit">${area.unit}</span></div>
        </div>
      </div>

    `;
  }
}
</script>
</body>
</html>
